<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Описание товара</title>
  <style>
    .product-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      /* отступ между изображением и текстом */
    }

    #product-image {
      max-width: 500px;
      height: auto;
    }

    h1 {
      text-align: center;
      /* центрируем заголовок */
    }

    h1,
    p {
      font-size: 20px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 24px;
      }

      p {
        font-size: 16px;
      }
    }

    /* Медиазапрос для мобильных устройств */
    @media (max-width: 768px) {
      .product-container {
        flex-direction: column;
        /* делаем колонкой */
        align-items: center;
        /* центрируем содержимое */

      }

      #product-image {
        max-width: 100%;
        /* чтобы изображение было адаптивным */
      }
    }
  </style>
</head>

<body>
  <h1 id="product-title"></h1>
  <div class="product-container">
    <img id="product-image" src="" alt="" />
    <p id="product-description"></p>
  </div>

  <script>
    const products = {
      1: {
        name: "Мука пшеничная хлебопекарная в/с",
        description: `Мука пшеничная высший сорт — это премиальный продукт, созданный из отборной пшеницы высшего качества. Идеальна для выпечки хлеба, тортов и пирогов, обладает отличной пластичностью и высоким содержанием клейковины. Обеспечивает воздушную структуру изделий и яркий вкус, делая ваши кулинарные шедевры особенно вкусными и мягкими. ГОСТ 26574-2017. Условия хранения: относительная влажность воздуха до 70%, температура не более 25ºС. Пищевая ценность: белки — 10,3 г, жиры — 1,1 г, углеводы — 70,6 г, калорийность — 334 кКал, энергетическая ценность — 1396 кДж.`,
        image: "/img/cardmuka1.png"
      },
      2: {
        name: "Мука пшеничная хлебопекарная 1 сорт",
        description: "Мука пшеничная хлебопекарная 1 сорт — это высококачественный продукт, полученный из отборной пшеницы, идеально подходящий для приготовления хлеба, выпечки и других хлебобулочных изделий. Обладает высокой клейковиной, что обеспечивает мягкую текстуру, пышность и стабильный результат. Подходит как для домашнего, так и для профессионального использования, гарантируя превосходный вкус. ГОСТ 26574-2017. Пищевая ценность: белки — 10,6 г, жиры — 1,3 г, углеводы — 69 г, калорийность — 330 кКал, энергетическая ценность — 1382 кДж. Условия хранения: относительная влажность воздуха до 70%, температура не более 25ºС.",
        image: "/img/cardmuka1.png"
      },
      3: {
        name: "Мука пшеничная хлебопекарная 2 сорт",
        description: `Мука пшеничная хлебопекарная 2 сорта — это качественный продукт, полученный из отборных зерен, прошедших строгий контроль качества. Отличается хорошей клейковиной и сбалансированным составом, что делает её универсальной для различных видов выпечки и кулинарных изделий. Подходит для приготовления хлеба, галет, лепешек и пирогов, обеспечивая стабильную текстуру и приятный вкус. Идеальна для тех, кто ищет качественную пшеницу по доступной цене, сохраняя при этом все основные свойства и преимущества. ГОСТ 26574-2017. Условия хранения: относительная влажность воздуха до 70%, температура не более 25ºС. Пищевая ценность: белки — 11,6 г, жиры — 1,8 г, углеводы — 64,8 г, калорийность — 322 кКал, энергетическая ценность — 1347 кДж.`,
        image: "/img/cardmuka1.png"
      },
      // добавьте остальные товары по мере необходимости
    };


    // Получаем параметр id из URL
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    if (id && products[id]) {
      document.getElementById('product-title').textContent = products[id].name;
      document.getElementById('product-description').textContent = products[id].description;
      document.getElementById('product-image').src = products[id].image;
      document.getElementById('product-image').alt = products[id].name;
    } else {
      document.getElementById('product-title').textContent = "Товар не найден";
      document.getElementById('product-description').textContent = "";
      document.getElementById('product-image').src = "";
    }
  </script>
</body>

</html>
